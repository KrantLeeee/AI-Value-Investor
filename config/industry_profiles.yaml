# Industry-specific agent weights and scoring thresholds
# Based on PROJECT_ROADMAP.md P1-⑤
#
# IMPORTANT: All weights marked validated: false
# These are "informed assumptions" pending P3 prediction tracking data
# Requires ≥20 predictions per industry for statistical calibration

industry_profiles:
  energy:
    weights:
      fundamentals: 0.25
      valuation: 0.30
      warren_buffett: 0.15
      ben_graham: 0.20
      sentiment: 0.10
    rationale: "资源股估值对油价极敏感(→高valuation权重)，护城河非差异化因素(→低buffett)，情绪主要反映油价非公司基本面"
    validated: false

    # Fundamentals scoring thresholds (adjusted for heavy asset industries)
    scoring:
      roe_thresholds: [15, 10, 6]  # Lower than default due to capital intensity
      net_margin_thresholds: [12, 6, 3]
      de_thresholds: [0.5, 0.8, 1.5]  # Resource stocks typically have higher leverage
      growth_weight: 0.15  # Cyclical growth is unstable
      cash_quality_weight: 0.30  # Cash flow critical for resource stocks
      wacc_range: [0.08, 0.10]  # Energy/resources: higher β + cyclical volatility
      default_beta: 1.1  # Slightly higher than market for cyclical sectors

    # Phase 3: Industry valuation multiples (replace fixed 6x/8x parameters)
    valuation_multiples:
      ev_ebitda:
        cycle_bottom: 4.5    # Trough valuation (2020 oil crash)
        cycle_normal: 6.5    # Mid-cycle average
        cycle_peak: 10.0     # Peak valuation (2022 energy boom)
      pb:
        cycle_bottom: 0.6
        cycle_normal: 1.0
        cycle_peak: 1.8
      ps:
        cycle_bottom: 0.5
        cycle_normal: 1.0
        cycle_peak: 2.0

    # Phase 3: Industry comparable companies (top 5 A-share)
    comparable_companies:
      - ticker: "601808.SH"
        name: "中海油服"
        note: "油田服务龙头"
      - ticker: "600028.SH"
        name: "中国石化"
        note: "综合油气巨头"
      - ticker: "601857.SH"
        name: "中国石油"
        note: "上游开采龙头"
      - ticker: "600583.SH"
        name: "海油工程"
        note: "海洋工程服务"
      - ticker: "002353.SZ"
        name: "杰瑞股份"
        note: "油服设备"

